<style>
  .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
  }

  .hero-content {
    max-width: 900px;
    text-align: center;
    color: white;
  }

  .profile-image {
    width: 600px;
    height: 400px;
    border-radius: 20px;
    object-fit: cover;
    border: 5px solid rgba(255, 255, 255, 0.3);
    margin-bottom: 30px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
  }

  .hero h1 {
    font-size: 48px;
    font-weight: 700;
    margin-bottom: 20px;
    color: white;
  }

  .bio {
    font-size: 20px;
    line-height: 1.7;
    margin: 0 auto;
    max-width: 700px;
    color: rgba(255, 255, 255, 0.95);
  }

  .bio p {
    margin-bottom: 15px;
  }

  .social-links {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 40px;
  }

  .social-links a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.15);
    border: 2px solid rgba(255, 255, 255, 0.3);
    transition: all 0.3s ease;
    text-decoration: none;
  }

  .social-links a:hover {
    background: rgba(255, 255, 255, 0.25);
    border-color: rgba(255, 255, 255, 0.5);
    transform: translateY(-3px);
  }

  .social-links svg {
    width: 24px;
    height: 24px;
    fill: white;
  }

  .photo-caption {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.8);
    margin-top: -15px;
    margin-bottom: 30px;
  }
</style>
