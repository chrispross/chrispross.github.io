---
layout: minimal
title: Electoral Reform - Weighted Voting Proposal
---

<style>
  body {
    background: #000;
    min-height: 100vh;
  }

  .viz-container {
    max-width: 100%;
    margin: 0;
    padding: 80px 0 0 0;
  }

  .comparison {
    position: relative;
    width: 100%;
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }

  .comparison img {
    display: block;
    width: 100%;
    height: auto;
  }

  .before-img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  .before-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .toggle-container {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    gap: 0;
    background: rgba(0, 0, 0, 0.8);
    border-radius: 8px;
    padding: 4px;
    box-shadow: 0 4px 12px rgba(255,255,255,0.2);
  }

  .toggle-btn {
    padding: 12px 32px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    background: transparent;
    color: #999;
    cursor: pointer;
    transition: all 0.3s ease;
    border-radius: 6px;
  }

  .toggle-btn.active {
    background: white;
    color: #000;
  }

  .toggle-btn:hover:not(.active) {
    color: #fff;
  }
</style>

<div class="toggle-container">
  <button class="toggle-btn active" id="fptpBtn">Current</button>
  <button class="toggle-btn" id="weightedBtn">Proposed</button>
</div>

<div class="viz-container">
  <div class="comparison" id="comparison">
    <img src="{{ '/assets/electoral-reform/weighted_all_elections.png' | relative_url }}" alt="Proportional FPTP">
    <div class="before-img" id="beforeImg">
      <img src="{{ '/assets/electoral-reform/fptp_all_elections.png' | relative_url }}" alt="Current FPTP">
    </div>
  </div>
</div>

<script>
  (function() {
    const beforeImg = document.getElementById('beforeImg');
    const fptpBtn = document.getElementById('fptpBtn');
    const weightedBtn = document.getElementById('weightedBtn');

    function showFPTP() {
      beforeImg.style.clipPath = 'inset(0 0 0 0)';
      fptpBtn.classList.add('active');
      weightedBtn.classList.remove('active');
    }

    function showWeighted() {
      beforeImg.style.clipPath = 'inset(0 100% 0 0)';
      fptpBtn.classList.remove('active');
      weightedBtn.classList.add('active');
    }

    fptpBtn.addEventListener('click', showFPTP);
    weightedBtn.addEventListener('click', showWeighted);

    // Initialize to FPTP
    showFPTP();
  })();
</script>
