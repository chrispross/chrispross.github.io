---
layout: default
---
<article class="project">
  <header class="project-header">
    <h1>{{ page.title }}</h1>
    {% if page.description %}
    <p class="project-description">{{ page.description }}</p>
    {% endif %}
    {% if page.tags %}
    <div class="project-tags">
      {% for tag in page.tags %}
      <span class="tag">{{ tag }}</span>
      {% endfor %}
    </div>
    {% endif %}
  </header>

  <div class="project-content">
    {{ content }}
  </div>

  <footer class="project-footer">
    {% if page.link %}
    <a href="{{ page.link }}" class="project-link" target="_blank">View Project &rarr;</a>
    {% endif %}
    <a href="{{ '/work' | relative_url }}">&larr; Back to Work</a>
  </footer>
</article>
